<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>夜间自习室 · lo-fi study room</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>

<!-- ===== 场景:背景层(夜空 + 城市,通过窗户看出去) ===== -->
<svg id="sceneBack" class="layer" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#10152e"/>
      <stop offset="45%" stop-color="#241b3e"/>
      <stop offset="80%" stop-color="#3a2547"/>
      <stop offset="100%" stop-color="#54304a"/>
    </linearGradient>
    <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#fff6e0" stop-opacity="0.95"/>
      <stop offset="35%" stop-color="#ffe9b8" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#ffe9b8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="1600" height="900" fill="url(#sky)"/>
  <!-- 月亮 -->
  <circle cx="1190" cy="190" r="190" fill="url(#moonGlow)"/>
  <circle cx="1190" cy="190" r="62" fill="#fdf2d0"/>
  <circle cx="1225" cy="175" r="62" fill="#241b3e" opacity="0.55"/>
  <!-- 星星(JS 生成) -->
  <g id="stars"></g>
  <!-- 城市天际线(JS 生成楼体 + 窗户灯光) -->
  <g id="city"></g>
</svg>

<!-- ===== 雨层(canvas,落在玻璃上) ===== -->
<canvas id="rainCanvas" class="layer"></canvas>

<!-- ===== 场景:前景层(窗框 + 房间剪影 + 角色) ===== -->
<svg id="sceneFront" class="layer" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <radialGradient id="lampGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#ffcf87" stop-opacity="0.85"/>
      <stop offset="40%" stop-color="#ff9d57" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#ff9d57" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#1c1326"/>
      <stop offset="100%" stop-color="#2a1830"/>
    </linearGradient>
  </defs>

  <!-- 室内墙体:四周包住窗洞(窗洞 x250..1350 y60..600) -->
  <g fill="url(#wall)">
    <rect x="0" y="0"    width="1600" height="62"/>
    <rect x="0" y="598"  width="1600" height="302"/>
    <rect x="0" y="0"    width="252" height="900"/>
    <rect x="1348" y="0" width="252" height="900"/>
  </g>
  <!-- 窗框 + 中梃 -->
  <g fill="#160d1d">
    <rect x="244" y="56" width="1112" height="14"/>
    <rect x="244" y="592" width="1112" height="14"/>
    <rect x="244" y="56" width="14" height="548"/>
    <rect x="1342" y="56" width="14" height="548"/>
    <rect x="793" y="60" width="14" height="540"/>
    <rect x="250" y="326" width="1100" height="12"/>
  </g>

  <!-- 暖光:台灯光晕 -->
  <circle cx="430" cy="600" r="360" fill="url(#lampGlow)" id="glow" style="mix-blend-mode:screen"/>

  <!-- ===== 桌面与摆件(剪影) ===== -->
  <g fill="#170f1f">
    <!-- 桌面 -->
    <rect x="0" y="690" width="1600" height="210"/>
    <path d="M0 690 Q 800 666 1600 690 L1600 712 L0 712 Z" fill="#1e1428"/>
  </g>

  <!-- 台灯 -->
  <g fill="#0f0914">
    <rect x="300" y="560" width="14" height="140" rx="6"/>
    <rect x="250" y="688" width="120" height="14" rx="7"/>
    <path d="M280 470 q 90 -34 150 18 l-44 70 q -40 -44 -92 -22 Z"/>
    <circle cx="372" cy="560" r="9"/>
  </g>
  <circle cx="372" cy="566" r="16" fill="#ffdf9e" id="bulb"/>

  <!-- 绿植 -->
  <g>
    <path d="M150 700 l22 -78 l28 78 Z" fill="#13241c"/>
    <g fill="#1c3a2b" class="leaf">
      <path d="M176 624 q -52 -22 -64 -76 q 54 6 70 60 Z"/>
      <path d="M176 624 q 50 -28 60 -84 q -52 10 -66 66 Z"/>
      <path d="M176 628 q -8 -56 26 -96 q 26 44 0 96 Z"/>
    </g>
  </g>

  <!-- 书堆 -->
  <g>
    <rect x="600" y="650" width="150" height="20" rx="3" fill="#3a2740"/>
    <rect x="612" y="630" width="150" height="20" rx="3" fill="#4a2d3a"/>
    <rect x="604" y="610" width="150" height="20" rx="3" fill="#33263f"/>
  </g>

  <!-- 马克杯 + 热气 -->
  <g fill="#241830">
    <rect x="840" y="636" width="64" height="56" rx="10"/>
    <path d="M904 648 q 28 4 28 26 q 0 22 -28 24 Z" fill="none" stroke="#241830" stroke-width="10"/>
  </g>
  <g id="steam" stroke="#fbe7c6" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.5">
    <path class="s1" d="M858 626 q 10 -16 0 -32 q -10 -16 0 -32"/>
    <path class="s2" d="M878 622 q 10 -16 0 -32 q -10 -16 0 -32"/>
  </g>

  <!-- 笔记本电脑 -->
  <g fill="#1a1024">
    <path d="M980 692 l34 -72 l150 0 l34 72 Z"/>
    <rect x="1006" y="568" width="132" height="86" rx="6" fill="#120a1a"/>
    <rect x="1014" y="576" width="116" height="70" rx="3" fill="#6f9bd1" opacity="0.16" id="screen"/>
  </g>

  <!-- ===== 角色:戴耳机侧影,轻微呼吸 ===== -->
  <g id="figure" class="figure">
    <!-- 椅背 -->
    <path d="M1300 700 q -20 -150 30 -208 q 70 -10 80 40 l-10 168 Z" fill="#3a1c24"/>
    <!-- 身体 -->
    <path d="M1150 700 q -14 -150 70 -196 q 96 -8 120 40 q 20 92 0 156 Z" fill="#20141e"/>
    <!-- 手臂搭桌 -->
    <path d="M1170 654 q 70 -28 150 -8 l4 46 l-150 6 Z" fill="#241420"/>
    <!-- 头 -->
    <circle cx="1238" cy="468" r="60" fill="#241420"/>
    <!-- 发髻 -->
    <circle cx="1206" cy="430" r="34" fill="#1a0e16"/>
    <!-- 耳机 -->
    <path d="M1196 432 q 44 -60 96 -6" stroke="#120a10" stroke-width="16" fill="none" stroke-linecap="round"/>
    <rect x="1276" y="452" width="26" height="46" rx="12" fill="#120a10"/>
    <!-- 鼻尖暖色边光 -->
    <path d="M1178 470 q -8 8 0 18" stroke="#ffb877" stroke-width="4" fill="none" opacity="0.5"/>
  </g>

  <!-- 漂浮微尘 -->
  <g id="dust" fill="#ffe6bd"></g>

  <!-- 暖色调色 + 压角 -->
  <rect x="0" y="0" width="1600" height="900" fill="#ff7a3c" opacity="0.05" style="mix-blend-mode:overlay"/>
</svg>

<!-- 暗角 + 颗粒 -->
<div class="vignette layer"></div>
<div class="grain layer"></div>

<!-- ===== UI 覆盖层 ===== -->
<div id="ui" class="ui hidden">

  <!-- 左上:时钟 / 倒计时 / 一句话 -->
  <div class="panel topleft">
    <div id="clock" class="clock">--:--</div>
    <div id="date" class="muted"></div>
    <div id="countdown" class="countdown"></div>
    <div id="quote" class="quote"></div>
  </div>

  <!-- 右上:番茄钟 -->
  <div class="panel topright timer">
    <div class="timer-mode"><span id="tMode">专注</span> · <span id="tCount">🍅 0</span></div>
    <div id="tTime" class="timer-time">25:00</div>
    <div class="timer-btns">
      <button id="tStart" class="btn primary">开始</button>
      <button id="tSkip" class="btn">跳过</button>
      <button id="tReset" class="btn">重置</button>
    </div>
    <div class="timer-presets" id="presets">
      <button class="chip active" data-focus="25" data-break="5">25 · 5</button>
      <button class="chip" data-focus="50" data-break="10">考研 50 · 10</button>
      <button class="chip" data-focus="90" data-break="20">深度 90 · 20</button>
    </div>
  </div>

  <!-- 底部:声音 / 全屏 控制栏 -->
  <div class="panel dock">
    <button id="musicToggle" class="iconbtn" title="音乐">♪</button>
    <input id="musicVol" class="slider" type="range" min="0" max="100" value="55" title="音乐音量"/>
    <span class="sep"></span>
    <button id="rainToggle" class="iconbtn" title="雨声">☂</button>
    <input id="rainVol" class="slider" type="range" min="0" max="100" value="45" title="雨声音量"/>
    <span class="sep"></span>
    <button id="fsBtn" class="iconbtn" title="全屏">⛶</button>
  </div>

  <div class="nowplaying">♪ lo-fi beats · 实时生成 · 无限循环</div>
</div>

<!-- ===== 进入遮罩(满足浏览器自动播放策略 + 启动音频) ===== -->
<div id="gate" class="gate">
  <div class="gate-inner">
    <div class="gate-title">夜间自习室</div>
    <div class="gate-sub">lo-fi beats to study & 上岸 · 西电 2026</div>
    <button id="enterBtn" class="enter">点击进入</button>
    <div class="gate-hint">戴上耳机,效果更好 · 进入后自动播放音乐与雨声</div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
