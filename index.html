<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>夜间自习室 · lo-fi study room</title>
<!-- PWA:可添加到主屏幕,全屏运行像 App -->
<meta name="theme-color" content="#1a2142" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="夜间自习室" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="icon-180.png" />
<link rel="icon" type="image/png" href="icon-192.png" />
<link rel="stylesheet" href="styles.css?v=1.7.2" />
</head>
<body>

<!-- ===== 3D 场景:Three.js 等距自习室(见 scene3d.js) ===== -->
<canvas id="scene3d" class="layer"></canvas>

<!-- 暗角 + 颗粒(叠在 3D 画面上做电影质感) -->
<div class="vignette layer"></div>
<div class="grain layer"></div>

<!-- ===== UI 覆盖层 ===== -->
<div id="ui" class="ui hidden">

  <!-- 左上:时钟 / 倒计时 / 一句话 -->
  <div class="panel topleft">
    <div id="clock" class="clock">--:--</div>
    <div id="date" class="muted"></div>
    <div id="countdown" class="countdown"></div>
    <div id="quote" class="quote"></div>
  </div>

  <!-- 右上:番茄钟 -->
  <div class="panel topright timer">
    <div class="timer-mode"><span id="tMode">专注</span> · <span id="tCount">🍅 0</span></div>
    <div id="tTime" class="timer-time">25:00</div>
    <div class="timer-btns">
      <button id="tStart" class="btn primary">开始</button>
      <button id="tSkip" class="btn">跳过</button>
      <button id="tReset" class="btn">重置</button>
    </div>
    <div class="timer-presets" id="presets">
      <button class="chip active" data-focus="25" data-break="5">25 · 5</button>
      <button class="chip" data-focus="50" data-break="10">考研 50 · 10</button>
      <button class="chip" data-focus="90" data-break="20">深度 90 · 20</button>
    </div>
  </div>

  <!-- 底部:声音 / 全屏 控制栏 -->
  <div class="panel dock">
    <button id="musicToggle" class="iconbtn" title="音乐">♪</button>
    <button id="trackBtn" class="iconbtn trackbtn" title="切换音乐">♫ 雨巷</button>
    <input id="musicVol" class="slider" type="range" min="0" max="100" value="55" title="音乐音量"/>
    <span class="sep"></span>
    <button id="rainToggle" class="iconbtn" title="雨声">☂</button>
    <input id="rainVol" class="slider" type="range" min="0" max="100" value="45" title="雨声音量"/>

    <!-- 次要按钮:窄屏收进“更多”,向上弹出;宽屏直接平铺 -->
    <span class="sep dock-sep-more"></span>
    <div class="dock-rest" id="dockRest">
      <button id="fsBtn" class="iconbtn" title="全屏">⛶</button>
      <span class="sep"></span>
      <button id="todoBtn" class="iconbtn" title="待办清单">✓</button>
      <span class="sep"></span>
      <button id="acctBtn" class="iconbtn" title="登录 / 云端同步">☁</button>
    </div>
    <button id="moreBtn" class="iconbtn dock-more-btn" title="更多" aria-expanded="false">⋯</button>
  </div>

  <!-- 左下:待办清单(登录后云端同步,按天归档) -->
  <div class="panel todo hidden" id="todoPanel">
    <div class="todo-head">
      <span class="todo-title" id="todoTitle">待办</span>
      <span class="todo-actions">
        <button id="todoHist" class="todo-mini" title="历史记录 / 导出">记录</button>
        <button id="todoClose" class="todo-x" title="收起">×</button>
      </span>
    </div>
    <div class="todo-add">
      <input id="todoInput" class="todo-input" type="text" placeholder="加一项待办，回车添加…" maxlength="120" />
      <button id="todoAdd" class="btn primary">+</button>
    </div>
    <ul id="todoList" class="todo-list"></ul>
    <div id="todoHint" class="todo-hint"></div>
  </div>

  <div class="nowplaying">♪ 雨巷 · 实时生成 · 无限循环</div>
  <div class="ver" id="ver">v1.7.2</div>
</div>

<!-- ===== 登录 / 云端同步弹窗 ===== -->
<div id="authModal" class="auth-modal hidden">
  <div class="auth-card">
    <button id="authClose" class="auth-close" title="关闭">×</button>
    <div class="auth-title">云端同步</div>
    <div class="auth-sub">登录后,番茄记录与设置在手机/电脑间自动同步</div>
    <div id="authStatus" class="auth-status hidden"></div>
    <div id="authForm">
      <input id="authEmail" class="auth-input" type="email" placeholder="邮箱" autocomplete="email" />
      <input id="authPass" class="auth-input" type="password" placeholder="密码（至少 6 位）" autocomplete="current-password" />
      <div id="authMsg" class="auth-msg"></div>
      <div class="auth-btns">
        <button id="authLogin" class="btn primary">登录</button>
        <button id="authSignup" class="btn">注册</button>
      </div>
    </div>
    <button id="authLogout" class="btn hidden">退出登录</button>
  </div>
</div>

<!-- ===== 待办历史记录弹窗 ===== -->
<div id="histModal" class="auth-modal hidden">
  <div class="auth-card hist-card">
    <button id="histClose" class="auth-close" title="关闭">×</button>
    <div class="auth-title">待办记录</div>
    <div class="auth-sub">按日期归档，可导出为文本</div>
    <div id="histBody" class="hist-body"></div>
    <div class="hist-btns">
      <button id="histExport" class="btn primary">导出 .txt</button>
      <button id="histCopy" class="btn">复制</button>
    </div>
  </div>
</div>

<!-- ===== 进入遮罩(满足浏览器自动播放策略 + 启动音频) ===== -->
<div id="gate" class="gate">
  <div class="gate-inner">
    <div class="gate-title">夜间自习室</div>
    <div class="gate-sub">lo-fi beats to study & 上岸 · 西电 2026</div>
    <button id="enterBtn" class="enter">点击进入</button>
    <div class="gate-hint">戴上耳机,效果更好 · 进入后自动播放音乐与雨声</div>
  </div>
</div>

<!-- Three.js(本地 vendor)→ 控制器 → 3D 场景 → 应用逻辑 → 编辑器,顺序不能乱 -->
<script src="vendor/three.min.js"></script>
<script src="vendor/OrbitControls.js"></script>
<script src="vendor/TransformControls.js"></script>
<script src="scene3d.js?v=1.7.2"></script>
<script src="vendor/supabase.js"></script>
<script src="cloud.js?v=1.7.2"></script>
<script src="app.js?v=1.7.2"></script>
<!-- 可视化编辑器:仅当 URL 带 ?edit 时激活,正常访客零负担 -->
<script src="editor.js?v=1.7.3"></script>
</body>
</html>
